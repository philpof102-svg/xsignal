name: Publish npm + MCP registry

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no publish)'
        required: false
        default: 'false'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install deps
        run: npm install --no-audit --no-fund

      - name: Run tests
        run: npm test

      - name: npm publish
        if: ${{ inputs.dry_run != 'true' }}
        # continue-on-error: the version may already be published locally (E403
        # publish-over) or NPM_TOKEN may be absent — the MCP Registry publish
        # below must still run (github-oidc, no npm token needed).
        continue-on-error: true
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Install mcp-publisher
        if: ${{ inputs.dry_run != 'true' }}
        run: |
          curl -L https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_linux_amd64.tar.gz | tar xz
          chmod +x mcp-publisher
          ./mcp-publisher --version

      - name: MCP login (GitHub OIDC)
        if: ${{ inputs.dry_run != 'true' }}
        run: ./mcp-publisher login github-oidc

      - name: MCP publish
        if: ${{ inputs.dry_run != 'true' }}
        run: ./mcp-publisher publish
